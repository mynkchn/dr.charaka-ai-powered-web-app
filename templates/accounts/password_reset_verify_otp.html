{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Verify OTP - Reset Password{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card reset-card">
                <div class="card-header text-center">
                    <i class="fas fa-key fa-3x mb-3 text-primary"></i>
                    <h2 class="mb-0">Verify OTP</h2>
                    <p class="text-muted">Enter the OTP sent to your email</p>
                </div>
                <div class="card-body">
                    <form method="post" class="reset-form">
                        {% csrf_token %}
                        <div class="form-group">
                            <input type="text" name="otp" class="form-control" placeholder="Enter OTP" required>
                        </div>
                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg ripple">
                                <i class="fas fa-check me-2"></i>Verify OTP
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <a href="{% url 'accounts:password_reset' %}" class="text-decoration-none">
                            <i class="fas fa-arrow-left me-1"></i>Back to Reset Password
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
    .reset-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        transition: transform 0.3s ease;
    }

    .reset-card:hover {
        transform: translateY(-5px);
    }

    .reset-card .card-header {
        background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        color: white;
        border-radius: 15px 15px 0 0 !important;
        padding: 2rem;
    }

    .reset-card .card-header i {
        color: white;
    }

    .reset-form .form-control {
        border-radius: 10px;
        padding: 12px;
        border: 2px solid #e9ecef;
        transition: all 0.3s ease;
    }

    .reset-form .form-control:focus {
        border-color: #4CAF50;
        box-shadow: 0 0 0 0.2rem rgba(76, 175, 80, 0.25);
    }

    .btn-primary {
        background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        border: none;
        border-radius: 10px;
        padding: 12px;
        transition: all 0.3s ease;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }
</style>
{% endblock %}
